# compatibility with gnu screen
set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -g escape-time 0

# status line as in (my) gnu screen
set -g status-position top
set -g status-interval 1
set -g status-left "%y.%m.%d|%H:%M:%S|#h|#S|"
set -g status-left-length 120
set -g status-right "#(cut -d ' ' -f1-3 /proc/loadavg)"
set -g status-right-length 30

set -g base-index 1
